name: Build Fabric Mod (1.20.6)

on:
  push:
    paths:
      - 'afk-fabric/**'
      - '.github/workflows/build-fabric.yml'
  pull_request:
    paths:
      - 'afk-fabric/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle 8.8 + cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'
          # Caches ~/.gradle/caches and ~/.gradle/wrapper automatically.
          # Fabric Loom also writes to ~/.gradle/caches/fabric-loom-cache (~1 GB
          # of MC jars + mappings) — this is included in the same cache bucket.
          cache-read-only: false

      - name: Build Fabric mod
        working-directory: afk-fabric
        run: gradle build --no-daemon
        # --no-daemon: avoids CI orphan daemon processes;
        # the daemon cache is useless between fresh runners.

      - name: Collect JAR (exclude -sources)
        run: |
          mkdir -p out
          find afk-fabric/build/libs -name '*.jar' ! -name '*-sources*' \
            -exec cp {} out/ \;
          echo "Built: $(ls -lh out/)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: afkverify-fabric-1.20.6
          path: out/*.jar
          if-no-files-found: error
          retention-days: 30
