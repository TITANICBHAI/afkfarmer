name: Release — Build All & Publish

# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true

permissions:
  contents: write   # needed to create a GitHub Release

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 1 — Spigot/Paper plugin  (plain javac, no Gradle)
  # ────────────────────────────────────────────────────────────────────────────
  build-spigot:
    name: Spigot/Paper plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Paper API
        run: |
          mkdir -p afk-plugin/libs
          curl -sSL --fail \
            "https://repo.papermc.io/repository/maven-public/io/papermc/paper/paper-api/1.20.4-R0.1-SNAPSHOT/paper-api-1.20.4-R0.1-SNAPSHOT-20231217.192524-23.jar" \
            -o afk-plugin/libs/paper-api.jar \
          || curl -sSL \
            "https://hub.spigotmc.org/nexus/content/repositories/snapshots/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/spigot-api-1.20.4-R0.1-SNAPSHOT.jar" \
            -o afk-plugin/libs/paper-api.jar
          echo "API: $(du -sh afk-plugin/libs/paper-api.jar)"

      - name: Compile + package
        run: |
          mkdir -p afk-plugin/build/classes
          javac -encoding UTF-8 -source 8 -target 8 \
            -cp afk-plugin/libs/paper-api.jar \
            -d afk-plugin/build/classes \
            $(find afk-plugin/src/main/java -name '*.java')
          cp afk-plugin/src/main/resources/plugin.yml afk-plugin/build/classes/
          cp afk-plugin/src/main/resources/config.yml afk-plugin/build/classes/
          jar cf AFKVerify-spigot.jar -C afk-plugin/build/classes .
          echo "Jar: $(du -sh AFKVerify-spigot.jar)"

      - uses: actions/upload-artifact@v4
        with:
          name: release-spigot
          path: AFKVerify-spigot.jar

  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 2 — Fabric mod (Minecraft 1.20.6, Java 21, Gradle 8.8 + Loom)
  # ────────────────────────────────────────────────────────────────────────────
  build-fabric:
    name: Fabric mod 1.20.6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'
          cache-read-only: false

      - name: Build
        working-directory: afk-fabric
        run: gradle build --no-daemon

      - name: Collect JAR
        run: |
          mkdir -p out-fabric
          find afk-fabric/build/libs -name '*.jar' ! -name '*-sources*' \
            -exec cp {} out-fabric/ \;
          echo "$(ls -lh out-fabric/)"

      - uses: actions/upload-artifact@v4
        with:
          name: release-fabric
          path: out-fabric/*.jar

  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 3 — Forge mod (Minecraft 1.16.5, Java 17, Gradle 7.6.4 + ForgeGradle)
  # ────────────────────────────────────────────────────────────────────────────
  build-forge:
    name: Forge mod 1.16.5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6.4'
          cache-read-only: false

      - name: Build
        working-directory: afk-forge
        run: gradle build --no-daemon

      - name: Collect JAR (reobfuscated only)
        run: |
          mkdir -p out-forge
          find afk-forge/build/libs -name '*.jar' \
            ! -name '*-sources*' ! -name '*-dev*' \
            -exec cp {} out-forge/ \;
          echo "$(ls -lh out-forge/)"

      - uses: actions/upload-artifact@v4
        with:
          name: release-forge
          path: out-forge/*.jar

  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 4 — Create GitHub Release (runs after all 3 builds succeed)
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-spigot, build-fabric, build-forge]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "AFKVerify ${{ github.ref_name || inputs.tag }}"
          body: |
            ## AFKVerify ${{ github.ref_name || inputs.tag }}

            ### JARs included
            | File | Platform | MC Version |
            |------|----------|------------|
            | `AFKVerify-spigot.jar` | Spigot / Paper | 1.13 – 1.20.x |
            | `afkverify-fabric-*.jar` | Fabric | 1.20.6 |
            | `afkverify-forge-*.jar` | Forge | 1.16.5 |

            ### Install
            Drop the appropriate JAR into your server's `plugins/` (Spigot/Paper)
            or `mods/` (Fabric/Forge) folder and restart.

            ### Usage with mc_farm.sh
            ```bash
            bash mc_farm.sh   # start/stop toggle
            tail -f /tmp/mc_afk_log.txt   # watch the solver log
            ```
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
